<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login sin Seguridad - Práctica</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div id="login-box" class="form-box">
            <h2>Iniciar Sesión</h2>
            <input type="email" id="login-email" placeholder="Correo electrónico">
            <input type="password" id="login-password" placeholder="Contraseña">
            <button onclick="login()">Entrar</button>
            <p>¿No tienes cuenta? <a href="#" onclick="toggleForm()">Regístrate</a></p>
        </div>

        <div id="register-box" class="form-box hidden">
            <h2>Registro</h2>
            <input type="text" id="reg-nombre" placeholder="Nombre">
            <input type="text" id="reg-apellido-paterno" placeholder="Apellido Paterno">
            <input type="text" id="reg-apellido-materno" placeholder="Apellido Materno">
            <input type="number" id="reg-edad" placeholder="Edad">
            <input type="text" id="reg-pais" placeholder="País">
            <input type="email" id="reg-email" placeholder="Correo electrónico">
            <input type="password" id="reg-password" placeholder="Contraseña">
            <button onclick="registrar()">Registrar Usuario</button>
            <p>¿Ya tienes cuenta? <a href="#" onclick="toggleForm()">Inicia sesión</a></p>
        </div>

        <div id="user-panel" class="form-box hidden">
            <h2>Panel de Usuario</h2>
            <p id="user-welcome">Has iniciado sesión correctamente.</p>
            <button onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/script.js"></script>
</body>
</html>
